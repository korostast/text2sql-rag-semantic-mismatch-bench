repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: check-ast
      - id: check-yaml
      - id: check-json
      - id: check-added-large-files
        args:
          - --maxkb=6000
      - id: check-merge-conflict
      - id: check-case-conflict
      - id: check-toml
      - id: check-symlinks
      - id: debug-statements
      - id: detect-private-key
      - id: pretty-format-json
        args:
          - --autofix
          - --indent=4
          - --no-ensure-ascii
          - --no-sort-keys
      - id: end-of-file-fixer
      - id: destroyed-symlinks
      - id: trailing-whitespace
      - id: check-builtin-literals
      - id: check-docstring-first
      - id: mixed-line-ending
      - id: requirements-txt-fixer
      - id: name-tests-test
        exclude: '[^tests/utils]'
      - id: fix-byte-order-marker
      - id: check-executables-have-shebangs
      - id: check-shebang-scripts-are-executable
      - id: no-commit-to-branch
  - repo: https://github.com/asottile/pyupgrade
    rev: v3.21.2
    hooks:
      - id: pyupgrade
        args: [--py310-plus]
  - repo: https://github.com/MarcoGorelli/absolufy-imports
    rev: v0.3.1
    hooks:
      - id: absolufy-imports
  - repo: https://github.com/hauntsaninja/no_implicit_optional.git
    rev: "1.4"
    hooks:
      - id: no_implicit_optional
  - repo: https://github.com/ikamensh/flynt.git
    rev: 1.0.6
    hooks:
      - id: flynt
        args: [-tc, -tj, -q]
  - repo: https://github.com/dannysepler/rm_unneeded_f_str
    rev: v0.2.0
    hooks:
      - id: rm-unneeded-f-str
  - repo: https://github.com/psf/black
    rev: 26.1.0
    hooks:
      - id: black
        language: system
        args: ["--line-length", "100"]
  - repo: https://github.com/PyCQA/isort
    rev: 8.0.1
    hooks:
      - id: isort
        language: system
        args: ["--profile", "black", "--line-length", "100", "--filter-files"]
  - repo: https://github.com/PyCQA/autoflake
    rev: v2.3.3
    hooks:
      - id: autoflake
        args: [--ignore-init-module-imports, --remove-all-unused-imports, --in-place]
  - repo: https://github.com/PyCQA/flake8
    rev: 7.3.0
    hooks:
      - id: flake8
        language: system
        args: [--config=./.flake8]
  - repo: https://github.com/shellcheck-py/shellcheck-py
    rev: v0.11.0.1
    hooks:
      - id: shellcheck
  - repo: https://github.com/AleksaC/hadolint-py.git
    rev: v2.14.0
    hooks:
      - id: hadolint
