services:
  opensearch:
    image: opensearchproject/opensearch:3.6.0
    container_name: t2sql-opensearch
    environment:
      - cluster.name=opensearch-cluster
      - node.name=opensearch-node1
      - discovery.type=single-node
      - bootstrap.memory_lock=true
      - "OPENSEARCH_JAVA_OPTS=-Xms512m -Xmx512m"
      - DISABLE_SECURITY_PLUGIN=true
      - DISABLE_DEVELOPMENT_PLUGINS=true
      - cluster.routing.allocation.disk.watermark.low=99%
      - cluster.routing.allocation.disk.watermark.high=99%
      - cluster.routing.allocation.disk.watermark.flood_stage=99%
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    volumes:
      - opensearch-data:/usr/share/opensearch/data
    ports:
      - 127.0.0.1:9200:9200
      - 127.0.0.1:9600:9600
    networks:
      - t2sql-opensearch-net

  opensearch-dashboards:
    image: opensearchproject/opensearch-dashboards:3.6.0
    container_name: t2sql-opensearch-dashboards
    ports:
      - 0.0.0.0:5602:5601
    environment:
      - 'OPENSEARCH_HOSTS=["http://t2sql-opensearch:9200"]'
      - DISABLE_SECURITY_DASHBOARDS_PLUGIN=true
    depends_on:
      - opensearch
    networks:
      - t2sql-opensearch-net

volumes:
  opensearch-data:

networks:
  t2sql-opensearch-net:
